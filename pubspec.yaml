name: kidpedia
description: "An interactive offline educational encyclopedia for children"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # UI Components
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  confetti: ^0.7.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # Media Players
  video_player: ^2.8.6
  audioplayers: ^6.0.0
  chewie: ^1.8.1

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  collection: ^1.18.0
  http: ^1.2.0

  # Routing
  go_router: ^14.1.3

  # Image handling
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true

  assets:
    # UI Assets - Keep only essential UI elements in the APK
    # All content media (images, videos, audio) is served from the backend server
    # This drastically reduces APK size
    
    # Animations (small file size, essential for UI)
    - assets/lottie/
    - assets/lottie/confetti.json
    - assets/lottie/loading.json
    - assets/lottie/celebration.json
    
    # Badges and Avatars (small UI elements)
    - assets/images/badges/
    - assets/images/avatars/
    - assets/images/onboarding/
    
    # NOTE: All other assets are served from the backend:
    # - Topic images (animals, space, science, history, geography)
    # - Videos (all categories)
    # - Audio files (narrations, sounds, music)
    # These are fetched on-demand from your local admin server

  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #         weight: 500
  # Note: Download Poppins font from Google Fonts and place in assets/fonts/ folder
  # Then uncomment the above section
